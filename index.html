<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editable Text Collision Poster</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #050505;
      --paper: #f4f3f1;
      --panel: rgb(255 255 255 / 92%);
      --line: #d8d6d0;
      --focus: #1f6feb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f7f6f3;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .controls {
      position: fixed;
      z-index: 5;
      top: 0;
      left: 0;
      width: min(340px, 34vw);
      max-width: 100vw;
      height: 100vh;
      overflow: auto;
      padding: 24px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .section-title {
      margin: 24px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: #2d2a25;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: #34322e;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgb(31 111 235 / 14%);
    }

    input[type="range"] {
      width: 100%;
      accent-color: #111;
    }

    .range-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 68px;
      align-items: center;
      gap: 10px;
    }

    .value {
      min-width: 62px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: right;
      font-size: 13px;
      color: #211f1b;
      background: #fafafa;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      min-height: 40px;
      border: 1px solid #111;
      border-radius: 8px;
      background: #111;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #111;
    }

    .stage,
    #posterSvg {
      width: 100vw;
      height: 100vh;
    }

    .stage {
      position: fixed;
      inset: 0;
    }

    #posterSvg {
      display: block;
      overflow: hidden;
      touch-action: none;
      background: #f7f6f3;
    }

    .paper {
      fill: var(--paper);
    }

    .main-text,
    .grid-glyph {
      fill: #000;
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-weight: 900;
      letter-spacing: 0;
      dominant-baseline: alphabetic;
    }

    .main-text {
      cursor: grab;
      user-select: none;
    }

    .main-text.dragging {
      cursor: grabbing;
    }

    .hit-box,
    .custom-hit {
      fill: transparent;
      cursor: grab;
    }

    .hit-box.dragging,
    .custom-hit.dragging {
      cursor: grabbing;
    }

    .custom-svg {
      pointer-events: none;
    }

    @media (max-width: 760px) {
      .controls {
        width: 100vw;
        height: 42vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <aside class="controls">
    <h1>Collision Text Poster</h1>

    <div class="control">
      <label for="mainText">Editable text</label>
      <input id="mainText" type="text" value="Save the Date">
    </div>

    <div class="control">
      <label for="wordSize">Word size</label>
      <div class="range-row">
        <input id="wordSize" type="range" min="6" max="28" step="0.1" value="22">
        <output id="wordSizeValue" class="value">22%</output>
      </div>
    </div>

    <div class="control">
      <label for="safeZone">Safe zone</label>
      <div class="range-row">
        <input id="safeZone" type="range" min="0" max="12" step="0.1" value="3.1">
        <output id="safeZoneValue" class="value">3.1%</output>
      </div>
    </div>

    <div class="control">
      <label for="edgePct">Canvas edge</label>
      <div class="range-row">
        <input id="edgePct" type="range" min="0" max="10" step="0.1" value="2.4">
        <output id="edgeValue" class="value">2.4%</output>
      </div>
    </div>

    <div class="section-title">Grid</div>

    <div class="control">
      <label for="gridText">Grid text</label>
      <input id="gridText" type="text" value="INDIGO 2026">
    </div>

    <div class="control">
      <label for="gridSize">Grid text size</label>
      <div class="range-row">
        <input id="gridSize" type="range" min="1.5" max="9" step="0.1" value="4.7">
        <output id="gridSizeValue" class="value">4.7%</output>
      </div>
    </div>

    <div class="control">
      <label for="columnGap">Grid x padding</label>
      <div class="range-row">
        <input id="columnGap" type="range" min="-2" max="16" step="0.1" value="3.8">
        <output id="columnGapValue" class="value">3.8%</output>
      </div>
    </div>

    <div class="control">
      <label for="rowGap">Grid y padding</label>
      <div class="range-row">
        <input id="rowGap" type="range" min="-1" max="10" step="0.1" value="0.8">
        <output id="rowGapValue" class="value">0.8%</output>
      </div>
    </div>

    <div class="control">
      <label for="gridSpeed">Grid left speed</label>
      <div class="range-row">
        <input id="gridSpeed" type="range" min="0" max="16" step="0.1" value="1.8">
        <output id="gridSpeedValue" class="value">1.8%</output>
      </div>
    </div>

    <div class="section-title">Word Physics</div>

    <div class="control">
      <label for="wordGap">Word collision gap</label>
      <div class="range-row">
        <input id="wordGap" type="range" min="0" max="8" step="0.1" value="0.8">
        <output id="wordGapValue" class="value">0.8%</output>
      </div>
    </div>

    <div class="control">
      <label for="floatStrength">Float strength</label>
      <div class="range-row">
        <input id="floatStrength" type="range" min="0" max="8" step="0.1" value="1.4">
        <output id="floatStrengthValue" class="value">1.4%</output>
      </div>
    </div>

    <div class="control">
      <label for="rotationAmount">Rotation amount</label>
      <div class="range-row">
        <input id="rotationAmount" type="range" min="0" max="100" step="1" value="34">
        <output id="rotationAmountValue" class="value">34%</output>
      </div>
    </div>

    <div class="control">
      <label for="bounce">Bounce</label>
      <div class="range-row">
        <input id="bounce" type="range" min="20" max="100" value="82">
        <output id="bounceValue" class="value">82%</output>
      </div>
    </div>

    <div class="control">
      <label for="friction">Move friction</label>
      <div class="range-row">
        <input id="friction" type="range" min="0" max="8" step="0.1" value="0.7">
        <output id="frictionValue" class="value">0.7%</output>
      </div>
    </div>

    <div class="section-title">SVG</div>

    <div class="control">
      <label for="svgUpload">Custom SVG</label>
      <input id="svgUpload" type="file" accept=".svg,image/svg+xml">
    </div>

    <div class="actions">
      <button id="resetWords" class="secondary" type="button">Reset</button>
      <button id="exportSvg" type="button">Export SVG</button>
    </div>
  </aside>

  <main class="stage">
    <svg id="posterSvg" viewBox="0 0 100 100" preserveAspectRatio="none" role="img" aria-label="Generated text collision poster">
      <rect class="paper" width="100" height="100"></rect>
      <g id="gridLayer"></g>
      <g id="customLayer"></g>
      <g id="mainLayer"></g>
      <g id="hitLayer"></g>
    </svg>
  </main>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const WORLD = { width: 100, height: 100 };
    const FONT_STACK = "Arial Black, Arial, Helvetica, sans-serif";
    const ROTATION_FRICTION = 9.5;

    const els = {
      mainText: document.querySelector("#mainText"),
      wordSize: document.querySelector("#wordSize"),
      wordSizeValue: document.querySelector("#wordSizeValue"),
      safeZone: document.querySelector("#safeZone"),
      safeZoneValue: document.querySelector("#safeZoneValue"),
      edgePct: document.querySelector("#edgePct"),
      edgeValue: document.querySelector("#edgeValue"),
      gridText: document.querySelector("#gridText"),
      gridSize: document.querySelector("#gridSize"),
      gridSizeValue: document.querySelector("#gridSizeValue"),
      columnGap: document.querySelector("#columnGap"),
      columnGapValue: document.querySelector("#columnGapValue"),
      rowGap: document.querySelector("#rowGap"),
      rowGapValue: document.querySelector("#rowGapValue"),
      gridSpeed: document.querySelector("#gridSpeed"),
      gridSpeedValue: document.querySelector("#gridSpeedValue"),
      wordGap: document.querySelector("#wordGap"),
      wordGapValue: document.querySelector("#wordGapValue"),
      floatStrength: document.querySelector("#floatStrength"),
      floatStrengthValue: document.querySelector("#floatStrengthValue"),
      rotationAmount: document.querySelector("#rotationAmount"),
      rotationAmountValue: document.querySelector("#rotationAmountValue"),
      bounce: document.querySelector("#bounce"),
      bounceValue: document.querySelector("#bounceValue"),
      friction: document.querySelector("#friction"),
      frictionValue: document.querySelector("#frictionValue"),
      svgUpload: document.querySelector("#svgUpload"),
      resetWords: document.querySelector("#resetWords"),
      exportSvg: document.querySelector("#exportSvg"),
      svg: document.querySelector("#posterSvg"),
      gridLayer: document.querySelector("#gridLayer"),
      customLayer: document.querySelector("#customLayer"),
      mainLayer: document.querySelector("#mainLayer"),
      hitLayer: document.querySelector("#hitLayer")
    };

    const measureCanvas = document.createElement("canvas");
    const measureCtx = measureCanvas.getContext("2d");

    let gridGlyphs = [];
    let wordBodies = [];
    let customObjects = [];
    let gridSignatureValue = "";
    let wordSignatureValue = "";
    let gridOffset = 0;
    let activeBody = null;
    let lastFrame = performance.now();

    function svgEl(name, attrs = {}) {
      const node = document.createElementNS(SVG_NS, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      return node;
    }

    function clear(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function numberValue(element) {
      return Number(element.value);
    }

    function font(size) {
      return `900 ${size}px ${FONT_STACK}`;
    }

    function pct(value) {
      const rounded = Math.round(value * 10) / 10;
      return `${rounded}%`;
    }

    function tokensFromInput() {
      const text = els.mainText.value.trim() || "Save the Date";
      return text.split(/\s+/).filter(Boolean).slice(0, 9);
    }

    function metricsFor(text, size) {
      measureCtx.font = font(size);
      const metrics = measureCtx.measureText(text);
      return {
        width: metrics.width,
        ascent: metrics.actualBoundingBoxAscent || size * 0.78,
        descent: metrics.actualBoundingBoxDescent || size * 0.18,
        left: metrics.actualBoundingBoxLeft || 0,
        right: metrics.actualBoundingBoxRight || metrics.width
      };
    }

    function fitSize(text, maxWidth, maxHeight, maxSize) {
      const at100 = metricsFor(text, 100).width || 100;
      const widthSize = (maxWidth / at100) * 100;
      return clamp(Math.min(widthSize, maxHeight, maxSize), 2, maxSize);
    }

    function updateReadouts() {
      els.wordSizeValue.textContent = pct(numberValue(els.wordSize));
      els.safeZoneValue.textContent = pct(numberValue(els.safeZone));
      els.edgeValue.textContent = pct(numberValue(els.edgePct));
      els.gridSizeValue.textContent = pct(numberValue(els.gridSize));
      els.columnGapValue.textContent = pct(numberValue(els.columnGap));
      els.rowGapValue.textContent = pct(numberValue(els.rowGap));
      els.gridSpeedValue.textContent = pct(numberValue(els.gridSpeed));
      els.wordGapValue.textContent = pct(numberValue(els.wordGap));
      els.floatStrengthValue.textContent = pct(numberValue(els.floatStrength));
      els.rotationAmountValue.textContent = pct(numberValue(els.rotationAmount));
      els.bounceValue.textContent = pct(numberValue(els.bounce));
      els.frictionValue.textContent = pct(numberValue(els.friction));
    }

    function bodyBox(body, pad = 0) {
      if (body.kind === "svg") {
        return {
          left: body.x - pad,
          top: body.y - pad,
          right: body.x + body.width + pad,
          bottom: body.y + body.height + pad,
          width: body.width + pad * 2,
          height: body.height + pad * 2
        };
      }

      return {
        left: body.x - body.metrics.left - pad,
        top: body.y - body.metrics.ascent - pad,
        right: body.x + body.metrics.right + pad,
        bottom: body.y + body.metrics.descent + pad,
        width: body.metrics.width + pad * 2,
        height: body.metrics.ascent + body.metrics.descent + pad * 2
      };
    }

    function bodyCenter(body) {
      const box = bodyBox(body);
      return {
        x: (box.left + box.right) / 2,
        y: (box.top + box.bottom) / 2
      };
    }

    function rotatedRectContains(pointX, pointY, body, radius) {
      const box = bodyBox(body);
      const center = bodyCenter(body);
      const angle = -(body.angle || 0) * Math.PI / 180;
      const dx = pointX - center.x;
      const dy = pointY - center.y;
      const localX = dx * Math.cos(angle) - dy * Math.sin(angle);
      const localY = dx * Math.sin(angle) + dy * Math.cos(angle);
      return (
        Math.abs(localX) <= box.width / 2 + radius &&
        Math.abs(localY) <= box.height / 2 + radius
      );
    }

    function safeZoneBodies() {
      return wordBodies.concat(customObjects);
    }

    function glyphHitsSafeZone(glyph, x, y, metrics) {
      const radius = numberValue(els.safeZone);
      const centerX = x + glyph.width / 2;
      const centerY = y - metrics.ascent / 2 + metrics.descent / 2;
      return safeZoneBodies().some((body) => rotatedRectContains(centerX, centerY, body, radius));
    }

    function wordSignature() {
      return [
        tokensFromInput().join("|"),
        els.wordSize.value,
        els.edgePct.value
      ].join("|");
    }

    function rebuildWords(keepPositions = false) {
      const tokens = tokensFromInput();
      const oldWords = wordBodies;
      const targetSize = numberValue(els.wordSize);
      const edge = numberValue(els.edgePct);
      const band = (WORLD.height - edge * 2) / Math.max(1, tokens.length);
      const maxAngle = rotationMaxDegrees();

      clear(els.mainLayer);
      clear(els.hitLayer);

      wordBodies = tokens.map((text, index) => {
        const size = fitSize(text, WORLD.width - edge * 2, Math.max(4, band * 0.82), targetSize);
        const metrics = metricsFor(text, size);
        const existing = keepPositions ? oldWords[index] : null;
        const x = existing ? existing.x : (WORLD.width - metrics.width) / 2;
        const y = existing ? existing.y : edge + band * index + band * 0.68 + metrics.ascent * 0.2;
        const mass = Math.max(1, (metrics.width * (metrics.ascent + metrics.descent)) / 70);
        const textNode = svgEl("text", { class: "main-text" });
        const hitNode = svgEl("rect", { class: "hit-box" });
        const word = {
          kind: "word",
          text,
          index,
          x,
          y,
          vx: existing ? existing.vx : (Math.random() - 0.5) * 1.6,
          vy: existing ? existing.vy : (Math.random() - 0.5) * 1.6,
          angle: existing ? existing.angle : (Math.random() - 0.5) * maxAngle * 1.2,
          av: existing ? existing.av : (Math.random() - 0.5) * 3,
          wanderAngle: Math.random() * Math.PI * 2,
          wanderTimer: 0.6 + Math.random() * 1.4,
          turnPhase: Math.random() * Math.PI * 2,
          size,
          metrics,
          mass,
          textNode,
          hitNode,
          dragging: false,
          dragDx: 0,
          dragDy: 0,
          lastPointerTime: performance.now()
        };

        textNode.textContent = text;
        hitNode.addEventListener("pointerdown", (event) => startDrag(event, word));
        textNode.addEventListener("pointerdown", (event) => startDrag(event, word));
        els.mainLayer.appendChild(textNode);
        els.hitLayer.appendChild(hitNode);
        return word;
      });

      renderCustomObjects();
      wordBodies.forEach(keepBodyInsideWorld);
      wordSignatureValue = wordSignature();
      updateBodyNodes();
    }

    function renderCustomObjects() {
      [...els.hitLayer.querySelectorAll(".custom-hit")].forEach((node) => node.remove());
      clear(els.customLayer);
      customObjects.forEach((customObject) => {
        els.customLayer.appendChild(customObject.imageNode);
        els.hitLayer.appendChild(customObject.hitNode);
      });
    }

    function updateWordMetrics() {
      const edge = numberValue(els.edgePct);
      wordBodies.forEach((word) => {
        word.size = fitSize(word.text, WORLD.width - edge * 2, WORLD.height, numberValue(els.wordSize));
        word.metrics = metricsFor(word.text, word.size);
        word.mass = Math.max(1, (word.metrics.width * (word.metrics.ascent + word.metrics.descent)) / 70);
      });
    }

    function rotationMaxDegrees() {
      return numberValue(els.rotationAmount) * 0.36;
    }

    function updateBodyNodes() {
      const maxAngle = rotationMaxDegrees();
      wordBodies.forEach((word) => {
        word.angle = clamp(word.angle, -maxAngle, maxAngle);
        const box = bodyBox(word, 1);
        const center = bodyCenter(word);
        const rotate = `rotate(${word.angle.toFixed(3)} ${center.x.toFixed(3)} ${center.y.toFixed(3)})`;

        word.textNode.setAttribute("x", word.x.toFixed(3));
        word.textNode.setAttribute("y", word.y.toFixed(3));
        word.textNode.setAttribute("font-size", word.size.toFixed(3));
        word.textNode.setAttribute("transform", rotate);
        word.textNode.classList.toggle("dragging", word.dragging);

        word.hitNode.setAttribute("x", box.left.toFixed(3));
        word.hitNode.setAttribute("y", box.top.toFixed(3));
        word.hitNode.setAttribute("width", box.width.toFixed(3));
        word.hitNode.setAttribute("height", box.height.toFixed(3));
        word.hitNode.setAttribute("transform", rotate);
        word.hitNode.classList.toggle("dragging", word.dragging);
      });

      customObjects.forEach((object) => {
        const center = bodyCenter(object);
        const rotate = `rotate(${object.angle.toFixed(3)} ${center.x.toFixed(3)} ${center.y.toFixed(3)})`;
        object.imageNode.setAttribute("x", object.x.toFixed(3));
        object.imageNode.setAttribute("y", object.y.toFixed(3));
        object.imageNode.setAttribute("width", object.width.toFixed(3));
        object.imageNode.setAttribute("height", object.height.toFixed(3));
        object.imageNode.setAttribute("transform", rotate);
        object.hitNode.setAttribute("x", object.x.toFixed(3));
        object.hitNode.setAttribute("y", object.y.toFixed(3));
        object.hitNode.setAttribute("width", object.width.toFixed(3));
        object.hitNode.setAttribute("height", object.height.toFixed(3));
        object.hitNode.setAttribute("transform", rotate);
        object.hitNode.classList.toggle("dragging", object.dragging);
      });
    }

    function gridSignature() {
      return [
        els.gridText.value,
        els.gridSize.value,
        els.columnGap.value,
        els.rowGap.value
      ].join("|");
    }

    function phraseGlyphs(text, size) {
      const glyphs = [];
      let offset = 0;
      measureCtx.font = font(size);

      [...text].forEach((char) => {
        const metrics = metricsFor(char, size);
        const advance = measureCtx.measureText(char).width;
        if (char !== " ") {
          glyphs.push({ char, offset, width: metrics.width || advance });
        }
        offset += advance;
      });

      return { glyphs, width: offset };
    }

    function rebuildGrid() {
      clear(els.gridLayer);
      gridGlyphs = [];
      gridOffset = 0;

      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const phrase = phraseGlyphs(text, size);
      const metrics = metricsFor(text, size);
      const cellW = Math.max(phrase.width + numberValue(els.columnGap), size);
      const cellH = Math.max(metrics.ascent + metrics.descent + numberValue(els.rowGap), size * 0.6);
      const rows = Math.ceil((WORLD.height + cellH) / cellH);
      const cols = Math.ceil((WORLD.width + cellW * 2) / cellW);

      for (let row = 0; row < rows; row += 1) {
        for (let col = -1; col < cols; col += 1) {
          phrase.glyphs.forEach((glyph) => {
            const node = svgEl("text", {
              class: "grid-glyph",
              "font-size": size.toFixed(3)
            });
            node.textContent = glyph.char;
            els.gridLayer.appendChild(node);
            gridGlyphs.push({ row, col, glyph, node });
          });
        }
      }

      gridSignatureValue = gridSignature();
    }

    function layoutGrid() {
      if (gridSignatureValue !== gridSignature()) rebuildGrid();

      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const phrase = phraseGlyphs(text, size);
      const metrics = metricsFor(text, size);
      const edge = numberValue(els.edgePct);
      const cellW = Math.max(phrase.width + numberValue(els.columnGap), size);
      const cellH = Math.max(metrics.ascent + metrics.descent + numberValue(els.rowGap), size * 0.6);

      gridGlyphs.forEach((tile) => {
        const x = tile.col * cellW + edge - gridOffset + tile.glyph.offset;
        const y = tile.row * cellH + metrics.ascent + edge;
        const hidden = glyphHitsSafeZone(tile.glyph, x, y, metrics);
        tile.node.setAttribute("font-size", size.toFixed(3));
        tile.node.setAttribute("x", x.toFixed(3));
        tile.node.setAttribute("y", y.toFixed(3));
        tile.node.style.display = hidden ? "none" : "";
      });
    }

    function keepBodyInsideWorld(body) {
      const edge = numberValue(els.edgePct);
      const bounce = numberValue(els.bounce) / 100;
      const box = bodyBox(body, numberValue(els.wordGap) / 2);

      if (box.left < edge) {
        body.x += edge - box.left;
        body.vx = Math.abs(body.vx || 0) * bounce;
      }
      if (box.right > WORLD.width - edge) {
        body.x -= box.right - (WORLD.width - edge);
        body.vx = -Math.abs(body.vx || 0) * bounce;
      }
      if (box.top < edge) {
        body.y += edge - box.top;
        body.vy = Math.abs(body.vy || 0) * bounce;
      }
      if (box.bottom > WORLD.height - edge) {
        body.y -= box.bottom - (WORLD.height - edge);
        body.vy = -Math.abs(body.vy || 0) * bounce;
      }
    }

    function resolveWordCollision(a, b) {
      const pad = numberValue(els.wordGap) / 2;
      const aBox = bodyBox(a, pad);
      const bBox = bodyBox(b, pad);

      if (
        aBox.right <= bBox.left ||
        aBox.left >= bBox.right ||
        aBox.bottom <= bBox.top ||
        aBox.top >= bBox.bottom
      ) {
        return;
      }

      const aCenter = bodyCenter(a);
      const bCenter = bodyCenter(b);
      const overlapX = Math.min(aBox.right - bBox.left, bBox.right - aBox.left);
      const overlapY = Math.min(aBox.bottom - bBox.top, bBox.bottom - aBox.top);
      let nx = 0;
      let ny = 0;
      let separation = 0;

      if (overlapX < overlapY) {
        nx = aCenter.x < bCenter.x ? -1 : 1;
        separation = overlapX;
      } else {
        ny = aCenter.y < bCenter.y ? -1 : 1;
        separation = overlapY;
      }

      const invA = a.dragging ? 0 : 1 / a.mass;
      const invB = b.dragging ? 0 : 1 / b.mass;
      const invSum = invA + invB;
      if (invSum === 0) return;

      const correction = separation + 0.08;
      a.x += nx * correction * (invA / invSum);
      a.y += ny * correction * (invA / invSum);
      b.x -= nx * correction * (invB / invSum);
      b.y -= ny * correction * (invB / invSum);

      const relativeVx = a.vx - b.vx;
      const relativeVy = a.vy - b.vy;
      const velocityAlongNormal = relativeVx * nx + relativeVy * ny;
      if (velocityAlongNormal > 0) return;

      const bounce = numberValue(els.bounce) / 100;
      const impulse = (-(1 + bounce) * velocityAlongNormal) / invSum;
      a.vx += impulse * invA * nx;
      a.vy += impulse * invA * ny;
      b.vx -= impulse * invB * nx;
      b.vy -= impulse * invB * ny;
      a.av += impulse * invA * 0.04 * (ny || -nx);
      b.av -= impulse * invB * 0.04 * (ny || -nx);
    }

    function applyFloat(word, dt) {
      if (word.dragging) return;
      const strength = numberValue(els.floatStrength);
      const maxSpeed = 2.4 + strength * 0.4;

      word.wanderTimer -= dt;
      if (word.wanderTimer <= 0) {
        word.wanderTimer = 1.1 + Math.random() * 2.2;
        word.wanderAngle += (Math.random() - 0.5) * Math.PI * 1.4;
      }

      word.vx += Math.cos(word.wanderAngle) * strength * dt * 0.12;
      word.vy += Math.sin(word.wanderAngle) * strength * dt * 0.12;

      const speed = Math.hypot(word.vx, word.vy);
      if (speed > maxSpeed) {
        word.vx = (word.vx / speed) * maxSpeed;
        word.vy = (word.vy / speed) * maxSpeed;
      }
    }

    function applyRotation(word, dt, now) {
      const maxAngle = rotationMaxDegrees();
      if (maxAngle <= 0) {
        word.angle = 0;
        word.av = 0;
        return;
      }

      const wave = Math.sin(now * 0.00018 + word.turnPhase);
      word.av += wave * maxAngle * dt * 0.035;
      word.av *= Math.exp(-ROTATION_FRICTION * dt);
      word.angle += word.av * dt;

      if (word.angle > maxAngle || word.angle < -maxAngle) {
        word.av += (clamp(word.angle, -maxAngle, maxAngle) - word.angle) * dt * 9;
        word.angle = clamp(word.angle, -maxAngle, maxAngle);
      }
    }

    function solvePhysics(dt, now) {
      const damping = Math.exp(-numberValue(els.friction) * dt);

      wordBodies.forEach((word) => {
        applyFloat(word, dt);
        applyRotation(word, dt, now);

        if (!word.dragging) {
          word.x += word.vx * dt;
          word.y += word.vy * dt;
          word.vx *= damping;
          word.vy *= damping;
        }
      });

      for (let iteration = 0; iteration < 5; iteration += 1) {
        for (let i = 0; i < wordBodies.length; i += 1) {
          for (let j = i + 1; j < wordBodies.length; j += 1) {
            resolveWordCollision(wordBodies[i], wordBodies[j]);
          }
        }
        wordBodies.forEach(keepBodyInsideWorld);
      }
    }

    function pointerToWorld(event) {
      const point = els.svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(els.svg.getScreenCTM().inverse());
    }

    function startDrag(event, body) {
      event.preventDefault();
      event.stopPropagation();
      const point = pointerToWorld(event);
      activeBody = body;
      body.dragging = true;
      body.dragDx = point.x - body.x;
      body.dragDy = point.y - body.y;
      body.lastPointerTime = performance.now();
      body.vx = 0;
      body.vy = 0;
      event.currentTarget.setPointerCapture(event.pointerId);
      updateBodyNodes();
    }

    function moveDrag(event) {
      if (!activeBody) return;
      const point = pointerToWorld(event);
      const now = performance.now();
      const dt = Math.max(0.016, (now - activeBody.lastPointerTime) / 1000);
      const nextX = point.x - activeBody.dragDx;
      const nextY = point.y - activeBody.dragDy;
      activeBody.vx = (nextX - activeBody.x) / dt;
      activeBody.vy = (nextY - activeBody.y) / dt;
      activeBody.x = nextX;
      activeBody.y = nextY;
      activeBody.lastPointerTime = now;
      keepBodyInsideWorld(activeBody);
      solvePhysics(0.016, now);
      updateBodyNodes();
    }

    function endDrag() {
      if (!activeBody) return;
      activeBody.dragging = false;
      activeBody = null;
      updateBodyNodes();
    }

    function resetWords() {
      rebuildWords(false);
    }

    function updateFromControls() {
      updateReadouts();
      if (wordSignatureValue !== wordSignature()) {
        rebuildWords(true);
      } else {
        updateWordMetrics();
        wordBodies.forEach(keepBodyInsideWorld);
        updateBodyNodes();
      }
      if (gridSignatureValue !== gridSignature()) rebuildGrid();
      layoutGrid();
    }

    function handleSvgUpload(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.addEventListener("load", () => {
        const object = {
          kind: "svg",
          x: 12,
          y: 84,
          width: 76,
          height: 8,
          vx: 0,
          vy: 0,
          angle: -2.5,
          av: 0,
          mass: 12,
          dragging: false,
          dragDx: 0,
          dragDy: 0,
          imageNode: svgEl("image", {
            class: "custom-svg",
            href: reader.result
          }),
          hitNode: svgEl("rect", {
            class: "custom-hit"
          })
        };
        object.hitNode.addEventListener("pointerdown", (pointerEvent) => startDrag(pointerEvent, object));
        customObjects = [object];
        renderCustomObjects();
        updateBodyNodes();
        layoutGrid();
      });
      reader.readAsDataURL(file);
    }

    function exportSvg() {
      const clone = els.svg.cloneNode(true);
      clone.setAttribute("xmlns", SVG_NS);
      const hitLayer = clone.querySelector("#hitLayer");
      if (hitLayer) hitLayer.replaceChildren();
      const source = `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
      const blob = new Blob([source], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "collision-text-poster.svg";
      link.click();
      URL.revokeObjectURL(url);
    }

    function animate(now) {
      const dt = Math.min(0.033, (now - lastFrame) / 1000);
      lastFrame = now;
      const size = numberValue(els.gridSize);
      const phrase = phraseGlyphs(els.gridText.value.trim().toUpperCase() || "INDIGO 2026", size);
      const cellW = Math.max(phrase.width + numberValue(els.columnGap), size);
      gridOffset = (gridOffset + numberValue(els.gridSpeed) * dt) % cellW;
      solvePhysics(dt, now);
      layoutGrid();
      updateBodyNodes();
      requestAnimationFrame(animate);
    }

    [
      els.mainText,
      els.wordSize,
      els.safeZone,
      els.edgePct,
      els.gridText,
      els.gridSize,
      els.columnGap,
      els.rowGap,
      els.gridSpeed,
      els.wordGap,
      els.floatStrength,
      els.rotationAmount,
      els.bounce,
      els.friction
    ].forEach((element) => {
      element.addEventListener("input", updateFromControls);
      element.addEventListener("change", updateFromControls);
    });

    document.addEventListener("pointermove", moveDrag);
    document.addEventListener("pointerup", endDrag);
    document.addEventListener("pointercancel", endDrag);
    els.svgUpload.addEventListener("change", handleSvgUpload);
    els.resetWords.addEventListener("click", resetWords);
    els.exportSvg.addEventListener("click", exportSvg);

    updateReadouts();
    rebuildGrid();
    rebuildWords(false);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
